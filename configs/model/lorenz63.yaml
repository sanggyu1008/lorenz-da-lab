# Lorenz-63 기본 모델 설정
#
# 이 설정 파일은 첫 번째 실습에서는 필수로 사용하지 않아도 된다.
# 다만 이후 script 기반 실행이나 반복 실험을 할 때 사용할 수 있도록
# 기본 모델 매개변수와 시간적분 설정을 저장해둔다.

model:
  name: lorenz63

  parameters:
    sigma: 10.0
    rho: 28.0
    beta: 2.6666666666666665

numerics:
  method: euler
  dt: 0.005
  tmax: 20.0

initial_condition:
  x0:
    - 1.0
    - 1.0
    - 1.0

output:
  save_trajectory: true
  trajectory_path: outputs/trajectories/lorenz63_truth_euler.npy
  figure_dir: outputs/figures